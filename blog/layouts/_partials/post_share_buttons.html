{{- $pageurl := .Permalink }}
{{- $title := .Title | plainify }}
{{- $shareText := printf "%s %s" $title $pageurl }}

<div class="post-share">
  <div class="post-share__buttons">
    <a
      class="share-chip share-chip--linkedin"
      href="https://www.linkedin.com/shareArticle?mini=true&amp;url={{ $pageurl | urlquery }}&amp;title={{ $title | urlquery }}"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Share on LinkedIn"
    >
      <svg class="share-chip__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
      <span class="share-chip__label">LinkedIn</span>
    </a>

    <a
      class="share-chip share-chip--bluesky"
      href="https://bsky.app/intent/compose?text={{ $shareText | urlquery }}"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Share on Bluesky"
    >
      <svg class="share-chip__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
        <path d="M12 10.8c-1.087-2.114-4.046-6.053-6.798-7.995C2.566.944 1.561 1.266.902 1.565.139 1.908 0 3.08 0 3.768c0 .69.378 5.65.624 6.479.815 2.736 3.713 3.66 6.383 3.364.136-.02.275-.039.415-.056-.138.022-.276.04-.415.056-3.912.58-7.387 2.005-2.83 7.078 5.013 5.19 6.87-1.113 7.823-4.308.953 3.195 2.05 9.271 7.733 4.308 4.267-4.308 1.588-6.498-2.324-7.078a8.741 8.741 0 01-.415-.056c.14.017.279.036.415.056 2.67.297 5.568-.628 6.383-3.364.246-.828.624-5.79.624-6.478 0-.69-.139-1.861-.902-2.203-.659-.298-1.664-.62-4.3 1.24C16.046 4.748 13.087 8.687 12 10.8z"/>
      </svg>
      <span class="share-chip__label">Bluesky</span>
    </a>

    <a
      class="share-chip share-chip--saptodon"
      href="https://saptodon.org/share?text={{ $shareText | urlquery }}"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Share on Saptodon"
    >
      <svg class="share-chip__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
        <path d="M21.258 13.989c-.331 1.677-2.005 3.122-4.131 3.122-2.266 0-4.289-1.306-4.289-3.122 0-1.816 2.023-3.122 4.289-3.122 2.126 0 3.8 1.445 4.131 3.122h2.842zm-2.842 0c-.331-1.677-2.005-3.122-4.131-3.122-2.266 0-4.289 1.306-4.289 3.122 0 1.816 2.023 3.122 4.289 3.122 2.126 0 3.8-1.445 4.131-3.122H18.416zM5.742 10.011c.331-1.677 2.005-3.122 4.131-3.122 2.266 0 4.289 1.306 4.289 3.122 0 1.816-2.023 3.122-4.289 3.122-2.126 0-3.8-1.445-4.131-3.122H2.9zm2.842 0c.331 1.677 2.005 3.122 4.131 3.122 2.266 0 4.289-1.306 4.289-3.122 0-1.816-2.023-3.122-4.289-3.122-2.126 0-3.8 1.445-4.131 3.122h2.842zM12 22.958c5.989 0 10.833-4.477 10.833-10s-4.844-10-10.833-10S1.167 7.481 1.167 12.958s4.844 10 10.833 10z"/>
      </svg>
      <span class="share-chip__label">Saptodon</span>
    </a>

    <a
      class="share-chip share-chip--teams"
      href="https://teams.microsoft.com/share?href={{ $pageurl | urlquery }}&amp;msgText={{ $title | urlquery }}"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Share on Microsoft Teams"
    >
      <svg class="share-chip__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" aria-hidden="true" fill="currentColor">
        <path d="M9.186 4.797a2.42 2.42 0 1 0-2.86-2.448h1.178c.929 0 1.682.753 1.682 1.682zm-4.295 7.738h2.613c.929 0 1.682-.753 1.682-1.682V5.58h2.783a.7.7 0 0 1 .682.716v4.294a4.197 4.197 0 0 1-4.093 4.293c-1.618-.04-3-.99-3.667-2.35Zm10.737-9.372a1.674 1.674 0 1 1-3.349 0 1.674 1.674 0 0 1 3.349 0m-2.238 9.488-.12-.002a5.2 5.2 0 0 0 .381-2.07V6.306a1.7 1.7 0 0 0-.15-.725h1.792c.39 0 .707.317.707.707v3.765a2.6 2.6 0 0 1-2.598 2.598z"/>
        <path d="M.682 3.349h6.822c.377 0 .682.305.682.682v6.822a.68.68 0 0 1-.682.682H.682A.68.68 0 0 1 0 10.853V4.03c0-.377.305-.682.682-.682Zm5.206 2.596v-.72h-3.59v.72h1.357V9.66h.87V5.945z"/>
      </svg>
      <span class="share-chip__label">Teams</span>
    </a>

    <a
      class="share-chip share-chip--whatsapp"
      href="https://api.whatsapp.com/send?text={{ $shareText | urlquery }}"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Share on WhatsApp"
    >
      <svg class="share-chip__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.435 9.884-9.881 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      <span class="share-chip__label">WhatsApp</span>
    </a>

    <button
      type="button"
      class="share-chip share-chip--copy"
      data-share-url="{{ $pageurl }}"
      aria-label="Copy link to clipboard"
    >
      <svg class="share-chip__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
        <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
      </svg>
      <span class="share-chip__label share-chip__copy-label">Copy Link</span>
    </button>
  </div>
</div>
<script src="/js/post-share.js" defer></script>
